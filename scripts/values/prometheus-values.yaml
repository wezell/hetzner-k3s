# scripts/values/prometheus-values.yaml
# Helm values for kube-prometheus-stack on hetzner-k3s
# No image overrides — k3s embedded registry mirror handles all registries.

grafana:
  enabled: true
  # adminPassword injected at install time via --set grafana.adminPassword=...
  persistence:
    enabled: true
    size: 5Gi
    accessModes:
      - ReadWriteOnce
  # Caddy reverse-proxies to the Service directly — no Kubernetes Ingress needed.
  ingress:
    enabled: false
  grafana.ini:
    server:
      domain: observe.botcms.cloud
      root_url: "https://observe.botcms.cloud/"
    analytics:
      reporting_enabled: false
      check_for_updates: false
    auth.anonymous:
      enabled: false
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki-gateway.monitoring.svc.cluster.local
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 5000
        httpHeaderName1: "X-Scope-OrgID"
      secureJsonData:
        httpHeaderValue1: "monitoring"

prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

# k3s-specific: disable components that conflict with k3s embedded etcd/scheduler
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false

kubeApiServer:
  enabled: true

kubelet:
  enabled: true
  serviceMonitor:
    https: true
    insecureSkipVerify: true

coreDns:
  enabled: true
