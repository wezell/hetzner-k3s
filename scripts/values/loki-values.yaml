# scripts/values/loki-values.yaml
# Grafana Loki (SingleBinary) on hetzner-k3s
# Storage: Wasabi S3. No image overrides — chart defaults used.

deploymentMode: SingleBinary

loki:
  auth_enabled: true

  storage:
    type: s3
    bucketNames:
      chunks: ${WASABI_LOKI_BUCKET}
      ruler: ${WASABI_LOKI_BUCKET}
      admin: ${WASABI_LOKI_BUCKET}
    s3:
      endpoint: https://s3.wasabisys.com
      region: us-east-1
      s3ForcePathStyle: true
      accessKeyId: ""
      secretAccessKey: ""

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  limits_config:
    retention_period: 720h
    ingestion_rate_mb: 8
    ingestion_burst_size_mb: 16
    max_streams_per_user: 5000
    max_entries_limit_per_query: 50000
    per_stream_rate_limit: 4MB
    per_stream_rate_limit_burst: 8MB

  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    retention_delete_delay: 2h
    delete_request_store: s3

  ruler:
    storage:
      type: s3
      s3:
        endpoint: https://s3.wasabisys.com
        region: us-east-1
        s3ForcePathStyle: true

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  persistence:
    enabled: true
    size: 10Gi
    storageClass: hcloud-volumes   # Hetzner block storage

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable optional Memcached caches — reduces resource footprint on small clusters.
# Loki functions correctly without these; they only improve query latency at scale.
chunksCache:
  enabled: false
resultsCache:
  enabled: false

promtail:
  enabled: true
  config:
    clients:
      - url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push
        tenant_id: "{{ .Namespace }}"
    snippets:
      pipelineStages:
        - cri: {}
        - labeldrop:
            - filename
      extraRelabelConfigs:
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_label_tenant_id]
          target_label: tenant_id
        - source_labels: [__meta_kubernetes_pod_container_name]
          target_label: container
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

gateway:
  enabled: true
  replicas: 1

monitoring:
  selfMonitoring:
    enabled: false
  serviceMonitor:
    enabled: true
  dashboards:
    enabled: true

test:
  enabled: false
