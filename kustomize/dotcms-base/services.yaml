---
# ClusterIP Service — Caddy proxies to this
apiVersion: v1
kind: Service
metadata:
  name: dotcms
  labels:
    app.kubernetes.io/name: dotcms
spec:
  selector:
    app: dotcms
  ports:
    - name: http
      port: 80
      targetPort: 8082

---
# Headless Service — Caddy cname_router resolves this to individual pod IPs
# Name must be INSTANCE-hl; patched by overlay
apiVersion: v1
kind: Service
metadata:
  name: dotcms-hl
  labels:
    app.kubernetes.io/name: dotcms
spec:
  clusterIP: None
  selector:
    app: dotcms
  ports:
    - name: http
      port: 80
      targetPort: 8082
