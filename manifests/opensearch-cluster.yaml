---
# Shared OpenSearch cluster for all tenant environments.
# Applied by scripts/install-opensearch-cluster.sh via kubectl apply.
#
# Per-tenant isolation is via OpenSearch users + index prefixes created at
# tenant-add time (tenant-add.sh step 3).  A single cluster serves all
# tenants; no per-tenant cluster is required.
#
# Node pool is combined master+data (single-pool) with 3 replicas spread
# across 3 Hetzner nodes via the default pod anti-affinity rules enforced
# by the opensearch-operator.
#
# Image: mirror.gcr.io mirrors docker.io to avoid Docker Hub rate limits.

apiVersion: v1
kind: Namespace
metadata:
  name: opensearch
  labels:
    app.kubernetes.io/managed-by: hetzner-k3s

---
apiVersion: opensearch.opster.io/v1
kind: OpenSearchCluster
metadata:
  name: opensearch
  namespace: opensearch
  labels:
    app.kubernetes.io/managed-by: hetzner-k3s
    app.kubernetes.io/component: search
spec:
  general:
    version: "1.3.19"
    httpPort: 9200
    serviceName: opensearch
    # Pin image with explicit tag — without a tag the operator pulls :latest (3.x) which breaks
    image: mirror.gcr.io/opensearchproject/opensearch:1.3.19


  # Disable dashboards — not needed for headless search backend
  dashboards:
    enable: false
    version: "1.3.19"
    replicas: 0

  nodePools:
    # Single combined master+data pool — 3 replicas ensure quorum-safe HA.
    # The operator automatically applies pod anti-affinity so each replica
    # lands on a different Hetzner node.  Losing one node does not lose quorum.
    - component: masters
      replicas: 3
      diskSize: "20Gi"
      resources:
        requests:
          memory: "1Gi"
          cpu: "500m"
        limits:
          # 2Gi allows the JVM to use ~1Gi heap (50% of container limit)
          memory: "2Gi"
          cpu: "1000m"
      roles:
        - "master"
        - "data"
