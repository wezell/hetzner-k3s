---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  namespace: control-plane
---
# ClusterRole: control-plane needs broad K8s API access to provision tenant namespaces,
# deployments, services, secrets, PVs, PVCs, ingresses, and configmaps.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: control-plane
rules:
  - apiGroups: [""]
    resources: [namespaces, pods, services, secrets, configmaps, persistentvolumes, persistentvolumeclaims, resourcequotas, limitranges]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch, create, update, patch, delete]
  # exec into CNPG pod to run psql (postgres teardown)
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: control-plane
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: control-plane
