apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: control-plane
  labels:
    app: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  strategy:
    type: Recreate          # single replica — no rolling update needed
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      serviceAccountName: control-plane
      imagePullSecrets:
        - name: regcred
      containers:
        - name: control-plane
          image: dotcms/trial-control-plane:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: control-plane-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
